# 工作流名称，会显示在 GitHub Actions 页面左侧列表中。
name: update-nginx-demo

# 触发条件：
# 1. workflow_dispatch：允许在 GitHub 页面手动执行，并传入页面标题和文案。
# 2. push：当 main 分支里的 nginx demo 文件或 workflow 文件变化时自动执行。
on:
  workflow_dispatch:
    inputs:
      page_title:
        # 手动触发时传给 Docker build 的页面标题。
        description: Nginx demo page title
        required: true
        default: Nginx Demo
      page_message:
        # 手动触发时传给 Docker build 的页面展示文案。
        description: Nginx demo page message
        required: true
        default: Deployed by GitHub Actions, ECR, and EKS.
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-nginx-demo.yaml
      - .dockerignore
      - Dockerfile
      - default.conf
      - index.html.template
      - render_index.py

# 权限说明：
# contents: read 用于 actions/checkout 拉取仓库代码。
# id-token: write 用于通过 GitHub OIDC 获取 AWS 临时身份。
permissions:
  contents: read
  id-token: write

# 同一个分支同时只跑一个构建流程，避免重复推送镜像。
concurrency:
  group: update-nginx-demo-${{ github.ref }}
  cancel-in-progress: false

# 全局环境变量，后续 job 和 step 都可以直接使用。
env:
  # AWS 区域，需要和 ECR 仓库所在区域一致。
  AWS_REGION: us-east-1
  # ECR 仓库名，最终镜像会推送到 <account>.dkr.ecr.<region>.amazonaws.com/prod-ecr。
  ECR_REPOSITORY: prod-ecr
  # Docker 构建上下文目录。当前仓库根目录就是 nginx demo。
  # 不要命名为 DOCKER_CONTEXT；这是 Docker CLI 的保留环境变量。
  DOCKER_BUILD_CONTEXT: .

jobs:
  build-and-push:
    name: Build and push nginx demo image
    runs-on: ubuntu-latest

    steps:
      # 拉取当前仓库代码，供 Docker build 使用。
      - name: Checkout
        uses: actions/checkout@v4

      # 使用 GitHub OIDC 代入 AWS IAM Role。
      # 需要在仓库 Secrets 中配置 AWS_ROLE_TO_ASSUME。
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      # 登录 Amazon ECR，并把 registry 地址输出到 steps.ecr.outputs.registry。
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 构建 nginx demo 镜像并推送到 ECR。
      # 镜像 tag 使用 workflow 运行编号 + Git SHA，便于追踪每次发布来源。
      - name: Build and push nginx demo image
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          # push 触发时没有 inputs，所以这里使用默认标题和文案兜底。
          PAGE_TITLE: ${{ github.event.inputs.page_title || 'Nginx Demo' }}
          PAGE_MESSAGE: ${{ github.event.inputs.page_message || 'Deployed by GitHub Actions, ECR, and EKS.' }}
        run: |
          set -euo pipefail

          # 生成唯一镜像地址，例如：
          # <registry>/prod-ecr:nginx-demo-12-abcdef123456
          IMAGE_TAG="nginx-demo-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::12}"
          IMAGE_NAME="${ECR_REGISTRY}/${ECR_REPOSITORY}"
          IMAGE_URI="${IMAGE_NAME}:${IMAGE_TAG}"
          BUILD_TIME="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          # 把页面文案、Git SHA、运行编号和构建时间写入镜像，方便页面展示发布信息。
          docker build --pull \
            --build-arg "PAGE_TITLE=${PAGE_TITLE}" \
            --build-arg "PAGE_MESSAGE=${PAGE_MESSAGE}" \
            --build-arg "GIT_SHA=${GITHUB_SHA::12}" \
            --build-arg "GITHUB_RUN_NUMBER=${GITHUB_RUN_NUMBER}" \
            --build-arg "BUILD_TIME=${BUILD_TIME}" \
            -t "${IMAGE_URI}" \
            "${DOCKER_BUILD_CONTEXT}"

          docker push "${IMAGE_URI}"

          # 在 Actions Summary 中输出镜像地址，便于复制和排查。
          {
            echo "### Published image"
            echo
            echo "\`${IMAGE_URI}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
